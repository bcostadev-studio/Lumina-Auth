name: Dependabot Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  # Check if this is a Dependabot PR
  check-dependabot:
    name: Check Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      is-dependabot: ${{ steps.check.outputs.is-dependabot }}
      update-type: ${{ steps.metadata.outputs.update-type }}
      package-ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      dependency-type: ${{ steps.metadata.outputs.dependency-type }}

    steps:
      - name: Check if Dependabot PR
        id: check
        run: |
          echo "is-dependabot=true" >> $GITHUB_OUTPUT

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

  # Run tests on Dependabot PRs
  test-dependabot-pr:
    name: Test Dependabot Changes
    runs-on: ubuntu-latest
    needs: check-dependabot
    if: needs.check-dependabot.outputs.is-dependabot == 'true'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          JWT_ACCESS_EXPIRY: ${{ secrets.TEST_JWT_ACCESS_EXPIRY }}
          JWT_REFRESH_EXPIRY: ${{ secrets.TEST_JWT_REFRESH_EXPIRY }}

      - name: Build Docker image
        run: docker build -t lumina-api:test .

      - name: Test Docker image
        run: |
          docker run --rm --name lumina-test \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USERNAME=${{ secrets.TEST_DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.TEST_DB_NAME }} \
            -e JWT_SECRET=${{ secrets.TEST_JWT_SECRET }} \
            -e JWT_ACCESS_EXPIRY=${{ secrets.TEST_JWT_ACCESS_EXPIRY }} \
            -e JWT_REFRESH_EXPIRY=${{ secrets.TEST_JWT_REFRESH_EXPIRY }} \
            lumina-api:test timeout 5 node dist/server.js || true

  # Security vulnerability check
  security-check:
    name: Security Vulnerability Check
    runs-on: ubuntu-latest
    needs: [check-dependabot, test-dependabot-pr]
    if: needs.check-dependabot.outputs.is-dependabot == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: |
          npm audit --audit-level=moderate > audit-report.txt 2>&1 || echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
          cat audit-report.txt

      - name: Check for high/critical vulnerabilities
        id: vuln-check
        run: |
          if grep -E "(high|critical)" audit-report.txt; then
            echo "critical_vulns=true" >> $GITHUB_OUTPUT
          else
            echo "critical_vulns=false" >> $GITHUB_OUTPUT
          fi

      - name: Create security issue for critical vulnerabilities
        if: steps.vuln-check.outputs.critical_vulns == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditReport = fs.readFileSync('audit-report.txt', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Critical Security Vulnerabilities Found in PR #${context.issue.number}`,
              body: `## Critical Security Alert

              Dependabot PR #${context.issue.number} contains critical security vulnerabilities that require immediate attention.

              ### Audit Report:
              \`\`\`
              ${auditReport}
              \`\`\`

              ### Actions Required:
              1. Review the vulnerabilities listed above
              2. Assess the impact on the application
              3. Consider manual intervention if auto-merge is not appropriate

              **This PR will NOT be auto-merged due to security concerns.**

              Created by Dependabot automation workflow.`,
              labels: ['security', 'dependencies', 'critical']
            });

  # Auto-approve and merge safe updates
  auto-merge:
    name: Auto-merge Safe Updates
    runs-on: ubuntu-latest
    needs: [check-dependabot, test-dependabot-pr, security-check]
    if: |
      needs.check-dependabot.outputs.is-dependabot == 'true' &&
      needs.test-dependabot-pr.result == 'success' &&
      needs.security-check.result == 'success'

    steps:
      - name: Check if safe to auto-merge
        id: auto-merge-check
        run: |
          update_type="${{ needs.check-dependabot.outputs.update-type }}"
          dependency_type="${{ needs.check-dependabot.outputs.dependency-type }}"
          package_ecosystem="${{ needs.check-dependabot.outputs.package-ecosystem }}"

          # Define auto-merge criteria
          if [[ "$package_ecosystem" == "npm" ]]; then
            if [[ "$dependency_type" == "development" ]] ||
               [[ "$update_type" == "version-update:semver-patch" ]] ||
               [[ "$update_type" == "version-update:semver-minor" && "$dependency_type" == "development" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
            fi
          elif [[ "$package_ecosystem" == "github-actions" ]]; then
            if [[ "$update_type" == "version-update:semver-patch" ]] ||
               [[ "$update_type" == "version-update:semver-minor" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-approve PR
        if: steps.auto-merge-check.outputs.auto_merge == 'true'
        run: |
          gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.auto-merge-check.outputs.auto_merge == 'true'
        run: |
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on auto-merged PR
        if: steps.auto-merge-check.outputs.auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ needs.check-dependabot.outputs.update-type }}';
            const dependencyType = '${{ needs.check-dependabot.outputs.dependency-type }}';
            const packageEcosystem = '${{ needs.check-dependabot.outputs.package-ecosystem }}';
            const dependencyNames = '${{ needs.check-dependabot.outputs.dependency-names }}';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Dependabot Auto-Merge

              This PR has been automatically approved and merged because:

              - ✅ All tests passed
              - ✅ No critical security vulnerabilities detected
              - ✅ Update type: \`${updateType}\`
              - ✅ Dependency type: \`${dependencyType}\`
              - ✅ Package ecosystem: \`${packageEcosystem}\`
              - ✅ Dependencies: \`${dependencyNames}\`

              The changes are considered safe for automatic merging based on our automation rules.

              If you have concerns about this auto-merge, please review our Dependabot configuration in \`.github/dependabot.yml\`.`
            });

  # Handle manual review cases
  manual-review:
    name: Flag for Manual Review
    runs-on: ubuntu-latest
    needs: [check-dependabot, test-dependabot-pr, security-check, auto-merge]
    if: |
      needs.check-dependabot.outputs.is-dependabot == 'true' &&
      needs.auto-merge.result == 'skipped'

    steps:
      - name: Add labels for manual review
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ needs.check-dependabot.outputs.update-type }}';
            const dependencyType = '${{ needs.check-dependabot.outputs.dependency-type }}';

            const labels = ['dependencies', 'manual-review'];

            if (updateType === 'version-update:semver-major') {
              labels.push('major-update');
            }

            if (dependencyType === 'direct:production') {
              labels.push('production-dependency');
            }

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });

      - name: Comment for manual review
        uses: actions/github-script@v7
        with:
          script: |
            const updateType = '${{ needs.check-dependabot.outputs.update-type }}';
            const dependencyType = '${{ needs.check-dependabot.outputs.dependency-type }}';
            const dependencyNames = '${{ needs.check-dependabot.outputs.dependency-names }}';

            let reason = '';
            if (updateType === 'version-update:semver-major') {
              reason = 'This is a major version update that may contain breaking changes.';
            } else if (dependencyType === 'direct:production') {
              reason = 'This affects production dependencies and requires careful review.';
            } else {
              reason = 'This update requires manual review based on our automation rules.';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👥 Manual Review Required

              This Dependabot PR requires manual review before merging.

              **Reason:** ${reason}

              ### Update Details:
              - 📦 Dependencies: \`${dependencyNames}\`
              - 🏷️ Update type: \`${updateType}\`
              - 🔗 Dependency type: \`${dependencyType}\`

              ### Test Results:
              - ✅ Tests: ${{ needs.test-dependabot-pr.result }}
              - ✅ Security: ${{ needs.security-check.result }}

              Please review the changes and merge manually if appropriate.

              To auto-merge similar updates in the future, consider updating the automation rules in \`.github/workflows/dependabot.yml\`.`
            });

  # Clean up on failure
  cleanup-on-failure:
    name: Cleanup on Failure
    runs-on: ubuntu-latest
    needs: [check-dependabot, test-dependabot-pr, security-check]
    if: |
      needs.check-dependabot.outputs.is-dependabot == 'true' &&
      (needs.test-dependabot-pr.result == 'failure' || needs.security-check.result == 'failure')

    steps:
      - name: Comment on failed PR
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test-dependabot-pr.result }}';
            const securityResult = '${{ needs.security-check.result }}';

            let failureReason = '';
            if (testResult === 'failure') {
              failureReason += '❌ Tests failed\n';
            }
            if (securityResult === 'failure') {
              failureReason += '❌ Security check failed\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚫 Auto-merge Blocked

              This Dependabot PR cannot be automatically merged due to failures:

              ${failureReason}

              Please review the failed checks and address any issues before merging manually.

              ### Check Results:
              - Tests: ${testResult}
              - Security: ${securityResult}

              You may need to:
              1. Fix failing tests
              2. Address security vulnerabilities
              3. Review breaking changes
              4. Update configuration if needed`
            });

      - name: Add failure labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['dependencies', 'failed-checks'];

            if ('${{ needs.test-dependabot-pr.result }}' === 'failure') {
              labels.push('failing-tests');
            }

            if ('${{ needs.security-check.result }}' === 'failure') {
              labels.push('security-issue');
            }

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });
